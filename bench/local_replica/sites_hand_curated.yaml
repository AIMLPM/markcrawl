# Hand-curated supplement for DS-4 of specs/v099-speed-recovery-and-mrr-closure.md
# Generated 2026-04-30 to bring apiref + wiki per-class N to ~20 each.
#
# Sourcing constraint: avoid domain overlap with bench/sandbox/sites_pool.yaml
# (the existing 50-site retrieval benchmark) to keep DS-4's classifier
# evaluation independent of our retrieval pool. Wiki sites span 5+ wiki
# engines (MediaWiki, MoinMoin, DokuWiki) on different organizations to
# test the wiki-class classifier across implementations, not just Wikimedia.
#
# DS-4 loads this alongside sites_scrape_evals.yaml (143 sites from
# scrape-evals 1.0.0). Combined dataset = 171 sites stratified across
# 6 url_classes: 60 generic, 30 blog, 20 ecom, 20 docs, 21 apiref, 20 wiki.

